name: Daily content generation

on:
  workflow_dispatch:
  schedule:
    # 05:23 UTC is 06:23 in Berlin winter time and 07:23 in Berlin summer time.
    # Exact timing is not important for this project.
    - cron: "23 5 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CAN_GENERATE: ${{ secrets.OPENAI_API_KEY != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.D1_DATABASE_ID != '' && secrets.R2_BUCKET_NAME != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' && secrets.PUBLIC_SITE_URL != '' }}
    steps:
      - name: Skip until secrets are configured
        if: env.CAN_GENERATE != 'true'
        run: echo "Daily generator skipped because required GitHub Actions secrets are not configured yet."

      - name: Checkout
        if: env.CAN_GENERATE == 'true'
        uses: actions/checkout@v5

      - name: Setup Node
        if: env.CAN_GENERATE == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.CAN_GENERATE == 'true'
        run: npm ci

      - name: Generate daily item
        if: env.CAN_GENERATE == 'true'
        run: npm run generate:daily
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL: ${{ secrets.VAPID_CONTACT_EMAIL }}
          APP_TIMEZONE: Europe/Berlin
          DEFAULT_MODE: fictional_satire_news
          DEFAULT_LANGUAGE: en
