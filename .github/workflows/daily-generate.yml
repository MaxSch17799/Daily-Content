name: Daily content generation

on:
  workflow_dispatch:
    inputs:
      skip_if_exists_today:
        description: "Skip generation if today's date already has an item"
        required: false
        default: "false"
        type: boolean
  schedule:
    # 05:23 UTC is 06:23 in Berlin winter time and 07:23 in Berlin summer time.
    # Exact timing is not important for this project.
    - cron: "23 5 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_ACCOUNT_ID: f564988478746167a2d9fabbad78a203
      D1_DATABASE_ID: c57001e6-7d81-420f-b8b1-1f4266cb4e74
      R2_BUCKET_NAME: images
      PUBLIC_SITE_URL: https://daily-content.pages.dev
      VAPID_PUBLIC_KEY: BKMUeuRpsIpT_aheckXaIoZIpTeJI6JgatsJInVgLnJE1M1K8q9nSBc0ynWbM9MmH409a1GWPYl-_xk5g825bqU
      CAN_GENERATE: ${{ secrets.OPENAI_API_KEY != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' }}
    steps:
      - name: Skip until secrets are configured
        if: env.CAN_GENERATE != 'true'
        run: echo "Daily generator skipped because required GitHub Actions secrets are not configured yet."

      - name: Checkout
        if: env.CAN_GENERATE == 'true'
        uses: actions/checkout@v5

      - name: Setup Node
        if: env.CAN_GENERATE == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.CAN_GENERATE == 'true'
        run: npm ci

      - name: Generate daily item
        if: env.CAN_GENERATE == 'true'
        run: npm run generate:daily
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ env.D1_DATABASE_ID }}
          R2_BUCKET_NAME: ${{ env.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PUBLIC_SITE_URL: ${{ env.PUBLIC_SITE_URL }}
          VAPID_PUBLIC_KEY: ${{ env.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL: ${{ secrets.VAPID_CONTACT_EMAIL }}
          APP_TIMEZONE: Europe/Berlin
          DEFAULT_MODE: fictional_satire_news
          DEFAULT_LANGUAGE: en
          SKIP_IF_EXISTS_TODAY: ${{ github.event_name == 'schedule' && 'true' || inputs.skip_if_exists_today }}
